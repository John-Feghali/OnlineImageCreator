<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudioKit - Editor</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6.26.0/babel.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="editor-body">

  <div id="root"></div>
  
  <script src="images.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Text element rendered on the canvas ── */
    function TextElement({ el, isSelected, isDragging, onMouseDown }) {
      const style = {
        position: 'absolute',
        left: el.x + 'px',
        top: el.y + 'px',
        fontFamily: el.fontFamily,
        fontSize: el.fontSize + 'px',
        color: el.color,
        textAlign: el.textAlign,
        textShadow: el.shadow ? '2px 2px 4px rgba(0,0,0,0.5)' : 'none',
        cursor: isDragging ? 'grabbing' : 'grab',
        userSelect: 'none',
        outline: isSelected ? '2px dashed #0066cc' : '2px dashed transparent',
        padding: '4px',
        whiteSpace: 'pre',
        lineHeight: '1.2',
      };
      return (
        <div style={style} onMouseDown={(e) => onMouseDown(e, el.id)} onClick={(e) => e.stopPropagation()}>
          {el.content}
        </div>
      );
    }

    /* ── Image element rendered on the canvas ── */
    function ImageElement({ el, isSelected, isDragging, onMouseDown }) {
      const style = {
        position: 'absolute',
        left: el.x + 'px',
        top: el.y + 'px',
        width: el.width + 'px',
        cursor: isDragging ? 'grabbing' : 'grab',
        outline: isSelected ? '2px dashed #0066cc' : '2px dashed transparent',
        userSelect: 'none',
        display: 'block',
      };
      return (
        <img
          src={el.src}
          alt="canvas element"
          style={style}
          onMouseDown={(e) => onMouseDown(e, el.id)}
          onClick={(e) => e.stopPropagation()}
          draggable={false}/>
      );
    }

    /* ── Live design canvas ── */
    function DesignCanvas({ elements, selectedId, bgColor, bgImage, dragging, onMouseDown, canvasSize }) {
      const canvasStyle = {
        backgroundColor: bgColor,
        backgroundImage: bgImage ? 'url(' + bgImage + ')' : 'none',
        backgroundSize: 'cover',
        backgroundPosition: 'center',
        width: canvasSize.width + 'px',
        height: canvasSize.height + 'px',
      };
      return (
        <div className="design-canvas" style={canvasStyle}>
          {elements.length === 0 &&
            <p className="canvas-placeholder">
              Add text or images using the tools on the left.
            </p>
          }
          {elements.map(el =>
            el.type === 'text' ?
              <TextElement
                key={el.id}
                el={el}
                isSelected={el.id === selectedId}
                isDragging={dragging !== null && dragging.id === el.id}
                onMouseDown={onMouseDown}/>
            :
              <ImageElement
                key={el.id}
                el={el}
                isSelected={el.id === selectedId}
                isDragging={dragging !== null && dragging.id === el.id}
                onMouseDown={onMouseDown}/>
          )}
        </div>
      );
    }

    /* ── Left toolbar ── */
    function LeftToolbar({
      onAddText,
      onImageUpload,
      imageSearch,
      setImageSearch,
      onServerImageSearch,
      serverImages,
      imageStatus,
      onAddServerImage
    }) {
      return (
        <aside className="left-toolbar">
          <h3>Tools</h3>
          <ul className="tool-list">
            <li>
              <label className="tool-btn" onClick={onAddText} style={{display:'block', cursor:'pointer', marginBottom:'0'}}>
                + Add Text
              </label>
            </li>
            <li>
              <label className="tool-btn" style={{display:'block', cursor:'pointer', marginBottom:'0'}}>
                Upload Image
                <input
                  type="file"
                  accept="image/*"
                  onChange={onImageUpload}
                  style={{display:'none'}}/>
              </label>
            </li>
          </ul>

      <section className="image-search-panel">
        <h4>Pexels Images</h4>

        <input
          className="image-search-input"
          type="text"
          value={imageSearch}
          onChange={(e) => setImageSearch(e.target.value)}
          placeholder="Search images..."
        />

        <button className="tool-btn" onClick={onServerImageSearch}>
          Search Images
        </button>

        {imageStatus && <p className="panel-note">{imageStatus}</p>}

        <div className="server-image-grid">
          {serverImages.map(image => (
            <img
              key={image.id}
              src={image.thumbnail}
              alt={image.alt}
              title="Click to add image"
              onClick={() => onAddServerImage(image.fullImage)}
            />
          ))}
        </div>
      </section>
    </aside>
   );
  }

    /* ── Right feature panel ── */
    function RightPanel({
      selectedEl, bgColor, bgImage,
      onBgColorChange, onBgImageUpload, onBgImageClear,
      onUpdateElement, onDeleteSelected
    }) {
      return (
        <aside className="right-panel">
          <h3>Controls</h3>

          {!selectedEl &&
            <p className="panel-note" style={{marginBottom:'12px'}}>
              Click an element on the canvas to select and edit it.
            </p>
          }

          {selectedEl && selectedEl.type === 'text' &&
            <section className="control-group">
              <h4>Text Settings</h4>

              <label>
                Content:
                <input
                  type="text"
                  value={selectedEl.content}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'content', e.target.value)}
                  style={{width:'100%', padding:'3px', marginTop:'2px'}}/>
              </label>

              <label>
                Font:
                <select
                  value={selectedEl.fontFamily}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'fontFamily', e.target.value)}>
                  <option value="Arial">Arial</option>
                  <option value="Georgia">Georgia</option>
                  <option value="'Times New Roman'">Times New Roman</option>
                  <option value="'Courier New'">Courier New</option>
                  <option value="Verdana">Verdana</option>
                  <option value="Impact">Impact</option>
                </select>
              </label>

              <label>
                Size: {selectedEl.fontSize}px
                <input
                  type="range"
                  min="8"
                  max="96"
                  value={selectedEl.fontSize}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'fontSize', parseInt(e.target.value))}/>
              </label>

              <label>
                Color:
                <input
                  type="color"
                  value={selectedEl.color}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'color', e.target.value)}/>
              </label>

              <label style={{flexDirection:'row', alignItems:'center', gap:'8px'}}>
                Shadow:
                <input
                  type="checkbox"
                  checked={selectedEl.shadow}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'shadow', e.target.checked)}
                  style={{width:'auto', marginLeft:'6px'}}/>
              </label>

              <label>Align:</label>
              <div style={{display:'flex', gap:'4px', marginBottom:'8px'}}>
                <button
                  className="btn-small"
                  style={{fontWeight: selectedEl.textAlign === 'left' ? 'bold' : 'normal'}}
                  onClick={() => onUpdateElement(selectedEl.id, 'textAlign', 'left')}>
                  L
                </button>
                <button
                  className="btn-small"
                  style={{fontWeight: selectedEl.textAlign === 'center' ? 'bold' : 'normal'}}
                  onClick={() => onUpdateElement(selectedEl.id, 'textAlign', 'center')}>
                  C
                </button>
                <button
                  className="btn-small"
                  style={{fontWeight: selectedEl.textAlign === 'right' ? 'bold' : 'normal'}}
                  onClick={() => onUpdateElement(selectedEl.id, 'textAlign', 'right')}>
                  R
                </button>
              </div>

              <button
                className="btn-small btn-danger"
                onClick={onDeleteSelected}
                style={{width:'100%', padding:'5px'}}
              >Delete Element</button>
            </section>
          }

          {selectedEl && selectedEl.type === 'image' &&
            <section className="control-group">
              <h4>Image Settings</h4>

              <label>
                Width: {selectedEl.width}px
                <input
                  type="range"
                  min="20"
                  max="590"
                  value={selectedEl.width}
                  onChange={(e) => onUpdateElement(selectedEl.id, 'width', parseInt(e.target.value))}/>
              </label>

              <p style={{fontSize:'0.8rem', color:'dimgray', marginBottom:'8px'}}>
                Position: drag on canvas
              </p>

              <button
                className="btn-small btn-danger"
                onClick={onDeleteSelected}
                style={{width:'100%', padding:'5px'}}
              >Delete Element</button>
            </section>
          }

          <section className="control-group">
            <h4>Background</h4>

            <label>
              Color:
              <input type="color" value={bgColor} onChange={onBgColorChange} />
            </label>

            <label>
              Image:
              <input type="file" accept="image/*" onChange={onBgImageUpload} />
            </label>

            {bgImage &&
              <button
                className="btn-small"
                onClick={onBgImageClear}
                style={{marginTop:'6px', width:'100%'}}
              >Clear Background Image</button>
            }
          </section>
        </aside>
      );
    }

    function EditorApp() {
      const [elements, setElements] = useState([]);
      const [selectedId, setSelectedId] = useState(null);
      const [bgColor, setBgColor] = useState('#ffffff');
      const [bgImage, setBgImage] = useState('');
      const [projectTitle, setProjectTitle] = useState('Untitled Project');
      const [dragging, setDragging] = useState(null);
      
      const [imageSearch, setImageSearch] = useState("nature");
      const [serverImages, setServerImages] = useState([]);
      const [imageStatus, setImageStatus] = useState("");
      

      function addText() {
        const newEl = {
          id: Date.now(),
          type: 'text',
          content: 'New Text',
          x: 220,
          y: 160,
          fontFamily: 'Arial',
          fontSize: 24,
          color: '#000000',
          shadow: false,
          textAlign: 'left',
        };
        setElements(prev => [...prev, newEl]);
        setSelectedId(newEl.id);
      }

      function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const src = e.target.result;
          const img = new Image();
          img.onload = () => {
            const newEl = {
              id: Date.now(),
              type: 'image',
              src,
              x: 50,
              y: 50,
              width: 200,
              naturalWidth: img.naturalWidth,
              naturalHeight: img.naturalHeight,
            };
            setElements(prev => [...prev, newEl]);
            setSelectedId(newEl.id);
          };
          img.src = src;
        };
        reader.readAsDataURL(file);
        event.target.value = '';
      }

      function handleBgImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => setBgImage(e.target.result);
        reader.readAsDataURL(file);
        event.target.value = '';
      }

      async function handleServerImageSearch() {
  try {
    setImageStatus("Loading images...");

    const images = await searchPexelsImages(imageSearch);

    setServerImages(images);
    setImageStatus("");
  } catch (error) {
    console.error(error);
    setImageStatus("Could not load images. Check the API key.");
  }
}

function addServerImageToCanvas(imageUrl) {
  const img = new Image();
  img.onload = () => {
    const newEl = {
      id: Date.now(),
      type: "image",
      src: imageUrl,
      x: 50,
      y: 50,
      width: 220,
      naturalWidth: img.naturalWidth,
      naturalHeight: img.naturalHeight,
    };
    setElements(prev => [...prev, newEl]);
    setSelectedId(newEl.id);
  };
  img.src = imageUrl;
}

      async function captureCanvas() {
        const canvasEl = document.querySelector('.design-canvas');
        if (!canvasEl) return null;
        const previousSelected = selectedId;
        setSelectedId(null);
        await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const rendered = await html2canvas(canvasEl, {
          backgroundColor: bgColor,
          useCORS: true,
          allowTaint: true,
          scale: 2,
        });
        setSelectedId(previousSelected);
        return rendered;
      }

      function sanitizeFilename(name) {
        return (name || 'project').replace(/[^a-z0-9-_]+/gi, '_').slice(0, 60) || 'project';
      }

      async function downloadAsImage() {
        try {
          const rendered = await captureCanvas();
          if (!rendered) return;
          const link = document.createElement('a');
          link.download = sanitizeFilename(projectTitle) + '.png';
          link.href = rendered.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error(err);
          alert('Could not export image. External images may be blocked by CORS.');
        }
      }

      async function downloadAsPdf() {
        try {
          const rendered = await captureCanvas();
          if (!rendered) return;
          const imgData = rendered.toDataURL('image/png');
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({
            orientation: rendered.width >= rendered.height ? 'landscape' : 'portrait',
            unit: 'px',
            format: [rendered.width, rendered.height],
          });
          pdf.addImage(imgData, 'PNG', 0, 0, rendered.width, rendered.height);
          pdf.save(sanitizeFilename(projectTitle) + '.pdf');
        } catch (err) {
          console.error(err);
          alert('Could not export PDF. External images may be blocked by CORS.');
        }
      }

      function saveProject() {
  const project = {
    id: Date.now(),
    title: projectTitle || "Untitled Project",
    elements: elements,
    bgColor: bgColor,
    bgImage: bgImage,
    savedAt: new Date().toLocaleString()
  };

  const savedProjects =
    JSON.parse(localStorage.getItem("studioKitProjects")) || [];

  savedProjects.push(project);

  localStorage.setItem("studioKitProjects", JSON.stringify(savedProjects));

  alert("Project saved successfully!");
}

      function updateElement(id, prop, value) {
        setElements(prev => prev.map(el =>
          el.id === id ? Object.assign({}, el, { [prop]: value }) : el
        ));
      }

      function deleteSelected() {
        setElements(prev => prev.filter(el => el.id !== selectedId));
        setSelectedId(null);
      }

      function handleMouseDown(event, id) {
        event.stopPropagation();
        setSelectedId(id);
        setDragging({ id, startX: event.clientX, startY: event.clientY });
      }

      function handleMouseMove(event) {
        if (!dragging) return;
        const dx = event.clientX - dragging.startX;
        const dy = event.clientY - dragging.startY;
        setElements(prev => {
          const draggedEl = prev.find(el => el.id === dragging.id);
          if (!draggedEl) return prev;
          const newX = draggedEl.x + dx;
          const newY = draggedEl.y + dy;
          const shiftX = newX < 0 ? -newX : 0;
          const shiftY = newY < 0 ? -newY : 0;
          return prev.map(el => {
            if (el.id === dragging.id) {
              return Object.assign({}, el, { x: newX + shiftX, y: newY + shiftY });
            }
            return Object.assign({}, el, { x: el.x + shiftX, y: el.y + shiftY });
          });
        });
        setDragging(Object.assign({}, dragging, { startX: event.clientX, startY: event.clientY }));
      }

      function handleMouseUp() {
        setDragging(null);
      }

      function handleCanvasClick() {
        setSelectedId(null);
      }

      const selectedEl = elements.find(el => el.id === selectedId) || null;

      const canvasSize = React.useMemo(() => {
        const PADDING = 40;
        let w = 300, h = 200;
        elements.forEach(el => {
          if (el.type === 'text') {
            const tw = el.content.length * el.fontSize * 0.55;
            const th = el.fontSize * 1.4;
            w = Math.max(w, el.x + tw + PADDING);
            h = Math.max(h, el.y + th + PADDING);
          } else {
            const ratio = el.naturalWidth ? el.naturalHeight / el.naturalWidth : 0.75;
            w = Math.max(w, el.x + el.width + PADDING);
            h = Math.max(h, el.y + el.width * ratio + PADDING);
          }
        });
        return { width: Math.round(w), height: Math.round(h) };
      }, [elements]);

      return (
        <React.Fragment>
          <header className="editor-topbar">
            <div className="nav-logo"><a href="index.html">StudioKit</a></div>
            <input
              className="project-title-field"
              value={projectTitle}
              onChange={(e) => setProjectTitle(e.target.value)}
              placeholder="Project title..."/>
            <div className="topbar-actions">
              <button className="btn-secondary" onClick={saveProject}>Save</button>
              <button className="btn-secondary" onClick={downloadAsImage}>Download Image</button>
              <button className="btn-secondary" onClick={downloadAsPdf}>Download PDF</button>
              <a href="help.html" className="btn-secondary">Help</a>
            </div>
          </header>

          <div
            className="editor-layout"
            onMouseMove={handleMouseMove}
            onMouseUp={handleMouseUp}>
            <LeftToolbar 
              onAddText={addText} 
              onImageUpload={handleImageUpload} 
              imageSearch={imageSearch}
              setImageSearch={setImageSearch}
              onServerImageSearch={handleServerImageSearch}
              serverImages={serverImages}
              imageStatus={imageStatus}
              onAddServerImage={addServerImageToCanvas}
              />

            <main className="canvas-area" onClick={handleCanvasClick}>
              <p className="canvas-label">Live Preview — {canvasSize.width} × {canvasSize.height}</p>
              <DesignCanvas
                elements={elements}
                selectedId={selectedId}
                bgColor={bgColor}
                bgImage={bgImage}
                dragging={dragging}
                onMouseDown={handleMouseDown}
                canvasSize={canvasSize}/>
            </main>

            <RightPanel
              selectedEl={selectedEl}
              bgColor={bgColor}
              bgImage={bgImage}
              onBgColorChange={(e) => setBgColor(e.target.value)}
              onBgImageUpload={handleBgImageUpload}
              onBgImageClear={() => setBgImage('')}
              onUpdateElement={updateElement}
              onDeleteSelected={deleteSelected}/>
          </div>
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<EditorApp />);
  </script>

</body>
</html>
